name: Validation CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create sample candidates and run end-to-end check
      run: |
        # Create artifacts directory
        mkdir -p artifacts
        mkdir -p output
        mkdir -p data
        
         # Create a small dummy candidates dataset for testing CI pipeline
         python << 'PYTHON_EOF'
         import json

         with open('data/test_candidates.jsonl', 'w') as f:
             for i in range(1, 101):
                 candidate = {
                     "profile": {
                         "candidate_id": f"CAND_{i:07d}",
                         "headline": f"Professional {i}",
                         "summary": f"Test candidate with {i} years of experience in tech.",
                         "location": "India",
                         "years_of_experience": i % 20
                     }
                 }
                 f.write(json.dumps(candidate) + '\n')
         PYTHON_EOF
        
        # Zip it as required by pipeline
        gzip -k data/test_candidates.jsonl
        
        # 1. Run Precomputation on the test subset
        python precompute/precompute_embeddings.py --candidates data/test_candidates.jsonl.gz --artifacts-dir artifacts
        
        # 2. Run Ranker
        python src/rank.py --candidates data/test_candidates.jsonl.gz --out output/team_xxx.csv --artifacts-dir artifacts
        
        # 3. Verify that the output CSV exists and contains the expected ranked outputs
        echo "Validating generated output CSV..."
        python validate_submission.py output/team_xxx.csv --candidates data/test_candidates.jsonl.gz
